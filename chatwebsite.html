<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Chat with Dmitry</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:1;
font-family:Arial;
background:url("https://iili.io/qG9nAEx.md.jpg") center/cover no-repeat;
height:100vh;
display:flex;
flex-direction:column;
}

/* Header */
.header{
background:#075E54;
color:white;
padding:12px;
display:flex;
align-items:center;
font-weight:bold;
}

.header img{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.status{
font-size:12px;
opacity:0.8;
margin-left:5px;
}

/* Messages area */
.messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

/* Message bubbles */
.msg{
padding:10px 14px;
border-radius:10px;
max-width:70%;
font-size:14px;
word-wrap:break-word;
}

.client{
background:#DCF8C6;
align-self:flex-end;
}

.admin{
background:white;
border:1px solid #ddd;
}

/* Input bar fixed at bottom */
.input{
display:flex;
border-top:1px solid #ddd;
background:white;
position:sticky;
bottom:0;
}

.input input{
flex:1;
padding:14px;
border:none;
outline:none;
font-size:15px;
}

.input button{
background:#25D366;
border:none;
width:60px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.input button svg{
width:24px;
height:24px;
fill:white;
}

</style>
</head>

<body>

<div class="header">
<img src="https://iili.io/qEWJ4N2.md.jpg">
Dmitry
<span class="status" id="adminStatus"></span>
</div>

<div class="messages" id="messages"></div>

<div class="input">

<input id="msg" placeholder="Type message">

<button onclick="send()">

<svg viewBox="0 0 24 24">
<path d="M2 21L23 12 2 3 2 10 17 12 2 14z"/>
</svg>

</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBlC6CPF5N9rhzwHLbVxF4JOkJQtxJYlFk",
authDomain: "new-new-e8f16.firebaseapp.com",
databaseURL: "https://new-new-e8f16-default-rtdb.firebaseio.com",
projectId: "new-new-e8f16",
storageBucket: "new-new-e8f16.firebasestorage.app",
messagingSenderId: "1020691443735",
appId: "1:1020691443735:web:739774ecfc5c793d332c52"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Auto client ID */

let clientID = localStorage.getItem("chatID");

if(!clientID){
clientID = "client_" + Date.now();
localStorage.setItem("chatID", clientID);
}

const chatRef = ref(db,"chats/"+clientID);
const statusRef = ref(db,"status/"+clientID);

/* Online status */

set(statusRef,{isOnline:true,typing:false});

onDisconnect(statusRef).set({
isOnline:false,
typing:false
});

/* Listen messages */

onValue(chatRef,(snapshot)=>{

const box=document.getElementById("messages");
box.innerHTML="";

snapshot.forEach(child=>{

const m=child.val();
const cls=m.sender==="client"?"client":"admin";

box.innerHTML+=`<div class="msg ${cls}">${m.text}</div>`;

});

box.scrollTop=box.scrollHeight;

});

/* Admin status */

onValue(ref(db,"status/admin"),(snapshot)=>{

const s=snapshot.val();
let txt="";

if(s){
txt=s.isOnline?"Online":"Offline";
if(s.typing) txt="Typing...";
}

document.getElementById("adminStatus").textContent=txt;

});

/* Typing detection */

const msgInput=document.getElementById("msg");

msgInput.addEventListener("input",()=>{
set(ref(db,"status/"+clientID+"/typing"),
msgInput.value.length>0);
});

/* Send */

window.send=function(){

const text=msgInput.value;

if(!text) return;

push(chatRef,{
sender:"client",
text:text,
time:Date.now()
});

msgInput.value="";

set(ref(db,"status/"+clientID+"/typing"), false);

};

</script>

</body>
</html>
